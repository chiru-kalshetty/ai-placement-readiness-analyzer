{% extends 'placement/base.html' %}
{% block title %}Login | PlacementAI{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:1rem auto;">
    <h2 style="text-align:center; margin-bottom:1rem;">🔐 Login</h2>
    <form method="POST" novalidate>
        {% csrf_token %}
        <input class="form-input" type="text" name="username" placeholder="Username" required>
        <input class="form-input" type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p style="text-align:center;margin-top:0.8rem;">New user? <a href="{% url 'signup' %}" style="color:var(--primary);">Signup</a></p>
</div>
{% endblock %}
